<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>写文章 - siuser小伟</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    :root {
      --accent: #c9a96e;
      --accent-hover: #d4b87a;
      --bg: #0a0a0b;
      --surface: #141416;
      --surface-2: #1a1a1e;
      --border: #252529;
      --text: #f5f5f4;
      --text-sec: #a8a29e;
      --font-heading: "Playfair Display", "Noto Serif SC", Georgia, serif;
      --font-body: "Inter", "Noto Sans SC", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", "Fira Code", monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; }
    ::selection { background: var(--accent); color: var(--bg); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      height: 56px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; background: rgba(10,10,11,0.9); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .container { max-width: 900px; margin: 72px auto 40px; padding: 0 20px; }

    .input {
      width: 100%; padding: 10px 14px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text); font-size: 14px; outline: none;
      transition: border-color 0.2s; font-family: var(--font-body);
    }
    .input:focus { border-color: var(--accent); }
    .input-lg { font-size: 20px; padding: 12px 14px; font-family: var(--font-heading); font-weight: 600; }
    label { display: block; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-sec); margin-bottom: 6px; }
    .row { display: grid; gap: 14px; margin-bottom: 16px; }
    .row-2 { grid-template-columns: 1fr 1fr; }
    .row-3 { grid-template-columns: 2fr 1fr 1fr; }

    .toolbar {
      display: flex; flex-wrap: wrap; gap: 2px; padding: 8px 10px;
      border: 1px solid var(--border); border-bottom: none;
      border-radius: 10px 10px 0 0; background: var(--surface);
    }
    .toolbar-btn {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 32px; height: 30px; padding: 0 6px; border-radius: 5px;
      border: none; background: transparent; color: var(--text-sec);
      cursor: pointer; transition: all 0.15s; font-size: 13px; font-weight: 600;
    }
    .toolbar-btn:hover { background: var(--surface-2); color: var(--accent); }
    .toolbar-sep { width: 1px; height: 22px; background: var(--border); margin: 4px 5px; }

    .editor {
      width: 100%; min-height: 450px; padding: 16px; resize: vertical;
      border: 1px solid var(--border); border-radius: 0 0 10px 10px;
      background: var(--surface); color: var(--text);
      font-family: var(--font-mono); font-size: 14px; line-height: 1.8;
      outline: none; tab-size: 2;
    }
    .editor:focus { border-color: var(--accent); }

    .tabs { display: flex; gap: 4px; }
    .tab {
      padding: 5px 14px; border-radius: 6px; font-size: 12px;
      cursor: pointer; background: transparent; border: none;
      color: var(--text-sec); transition: all 0.15s;
    }
    .tab.active { background: var(--surface-2); color: var(--accent); }

    .preview {
      width: 100%; min-height: 450px; padding: 20px;
      border: 1px solid var(--border); border-radius: 10px;
      background: var(--surface); overflow-y: auto; line-height: 1.8;
      color: var(--text-sec); display: none;
    }
    .preview h1, .preview h2, .preview h3 { color: var(--text); font-family: var(--font-heading); margin: 1.2em 0 0.4em; }
    .preview h1 { font-size: 1.7em; } .preview h2 { font-size: 1.35em; } .preview h3 { font-size: 1.1em; }
    .preview p { margin-bottom: 0.8em; }
    .preview strong { color: var(--text); }
    .preview code { background: var(--surface-2); padding: 2px 5px; border-radius: 3px; font-size: 0.88em; font-family: var(--font-mono); }
    .preview pre { background: var(--surface-2); padding: 14px; border-radius: 8px; overflow-x: auto; margin: 1em 0; }
    .preview pre code { background: none; padding: 0; }
    .preview blockquote { border-left: 3px solid var(--accent); padding-left: 14px; margin: 1em 0; font-style: italic; }
    .preview ul, .preview ol { padding-left: 1.5em; margin-bottom: 0.8em; }
    .preview li { margin-bottom: 0.2em; }
    .preview hr { border: none; border-top: 1px solid var(--border); margin: 1.5em 0; }
    .preview a { color: var(--accent); }
    .preview table { border-collapse: collapse; width: 100%; margin: 1em 0; }
    .preview th, .preview td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
    .preview th { background: var(--surface-2); color: var(--text); }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 20px; border-radius: 8px; font-size: 13px;
      font-weight: 500; cursor: pointer; border: none; transition: all 0.2s;
    }
    .btn-primary { background: var(--accent); color: var(--bg); }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(201,169,110,0.3); }
    .btn-outline { background: transparent; color: var(--text-sec); border: 1px solid var(--border); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

    .actions { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
    .status { font-size: 12px; color: var(--text-sec); }

    .toast { position: fixed; top: 72px; right: 24px; padding: 12px 20px; border-radius: 8px; font-size: 13px; z-index: 100; animation: slideIn 0.3s ease; }
    .toast-ok { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
    .toast-err { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
    @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } }

    /* Login overlay */
    .login-overlay {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
    }
    .login-box { width: 100%; max-width: 380px; padding: 0 20px; text-align: center; }
    .login-logo {
      width: 56px; height: 56px; border-radius: 14px;
      background: var(--surface); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px; font-size: 22px; font-weight: 700;
      font-family: var(--font-heading); color: var(--accent);
    }
    .login-overlay.hidden { display: none; }

    @media (max-width: 640px) {
      .row-2, .row-3 { grid-template-columns: 1fr; }
      .container { padding: 0 12px; }
    }
  </style>
</head>
<body>

  <!-- Login -->
  <div class="login-overlay" id="login-overlay">
    <div class="login-box">
      <div class="login-logo">X</div>
      <h1 style="font-family:var(--font-heading);font-size:22px;margin-bottom:6px;">写文章</h1>
      <p style="font-size:13px;color:var(--text-sec);margin-bottom:28px;">输入 GitHub Token 后可以一键发布到博客</p>
      <div style="text-align:left;">
        <label>GitHub Token</label>
        <input type="password" id="token-input" class="input" placeholder="ghp_xxxxxxxxxxxx" style="margin-bottom:6px;" />
        <p style="font-size:11px;color:var(--text-sec);margin-bottom:16px;">
          <a href="https://github.com/settings/tokens/new" target="_blank" style="color:var(--accent);">点这里生成 Token</a>，勾选 repo 权限即可。只需输入一次，会记住。
        </p>
        <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;" id="btn-login">进入编辑器</button>
      </div>
      <a href="/" style="display:inline-block;margin-top:20px;font-size:12px;color:var(--text-sec);text-decoration:none;">← 返回网站</a>
    </div>
  </div>

  <!-- Topbar -->
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px;">
      <a href="/" style="color:var(--accent);text-decoration:none;font-family:var(--font-heading);font-size:15px;font-weight:600;">siuser小伟</a>
      <span style="font-size:11px;padding:2px 8px;border-radius:4px;background:var(--surface-2);color:var(--text-sec);">写文章</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <a href="/blog" style="font-size:12px;color:var(--text-sec);text-decoration:none;">查看博客</a>
      <button id="btn-logout" style="font-size:12px;color:var(--text-sec);background:none;border:none;cursor:pointer;">退出</button>
    </div>
  </div>

  <div class="container">
    <div class="row">
      <div>
        <label>文章标题</label>
        <input type="text" id="title" class="input input-lg" placeholder="输入文章标题..." />
      </div>
    </div>
    <div class="row row-3">
      <div>
        <label>摘要描述</label>
        <input type="text" id="description" class="input" placeholder="一句话描述..." />
      </div>
      <div>
        <label>标签（逗号分隔）</label>
        <input type="text" id="tags" class="input" placeholder="AI, 技术" />
      </div>
      <div>
        <label>日期</label>
        <input type="date" id="date" class="input" />
      </div>
    </div>
    <div class="row row-2">
      <div>
        <label>文件名 (slug)</label>
        <input type="text" id="slug" class="input" placeholder="自动生成" />
      </div>
      <div style="display:flex;align-items:flex-end;padding-bottom:2px;">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;margin-bottom:0;">
          <input type="checkbox" id="draft" style="accent-color:var(--accent);width:16px;height:16px;" />
          <span style="font-size:13px;color:var(--text-sec);">草稿（不公开）</span>
        </label>
      </div>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
      <label style="margin-bottom:0;">文章内容 (Markdown)</label>
      <div class="tabs">
        <button class="tab active" data-mode="edit">编辑</button>
        <button class="tab" data-mode="preview">预览</button>
        <button class="tab" data-mode="split">分屏</button>
      </div>
    </div>

    <div id="editor-container" style="display:grid;gap:14px;grid-template-columns:1fr;">
      <div id="editor-wrap">
        <div class="toolbar">
          <button type="button" class="toolbar-btn" data-action="h2">H2</button>
          <button type="button" class="toolbar-btn" data-action="h3">H3</button>
          <div class="toolbar-sep"></div>
          <button type="button" class="toolbar-btn" data-action="bold"><b>B</b></button>
          <button type="button" class="toolbar-btn" data-action="italic"><i>I</i></button>
          <button type="button" class="toolbar-btn" data-action="strike"><s>S</s></button>
          <button type="button" class="toolbar-btn" data-action="code">&lt;&gt;</button>
          <div class="toolbar-sep"></div>
          <button type="button" class="toolbar-btn" data-action="link">🔗</button>
          <button type="button" class="toolbar-btn" data-action="image">🖼️</button>
          <div class="toolbar-sep"></div>
          <button type="button" class="toolbar-btn" data-action="ul">•</button>
          <button type="button" class="toolbar-btn" data-action="ol">1.</button>
          <button type="button" class="toolbar-btn" data-action="quote">❝</button>
          <button type="button" class="toolbar-btn" data-action="codeblock">{ }</button>
          <div class="toolbar-sep"></div>
          <button type="button" class="toolbar-btn" data-action="hr">—</button>
          <button type="button" class="toolbar-btn" data-action="table">⊞</button>
        </div>
        <textarea class="editor" id="editor" placeholder="开始写作..."></textarea>
      </div>
      <div class="preview" id="preview"></div>
    </div>

    <div class="actions">
      <button class="btn btn-outline" id="btn-clear">清空</button>
      <div style="display:flex;align-items:center;gap:12px;">
        <span class="status" id="status"></span>
        <button class="btn btn-primary" id="btn-publish">
          <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.5 12.75l6 6 9-13.5"/></svg>
          一键发布
        </button>
      </div>
    </div>
  </div>

  <script>
    // ===== Config =====
    var REPO = 'siuserxiaowei/blog';
    var PATH = 'src/content/blog';

    // ===== Token =====
    function getToken() { return localStorage.getItem('gh_token'); }
    function setToken(t) { localStorage.setItem('gh_token', t); }

    // ===== Login =====
    var overlay = document.getElementById('login-overlay');
    if (getToken()) { overlay.classList.add('hidden'); }

    document.getElementById('btn-login').addEventListener('click', function() {
      var token = document.getElementById('token-input').value.trim();
      if (!token) return;
      // Test token
      var statusEl = this;
      statusEl.textContent = '验证中...';
      statusEl.disabled = true;
      fetch('https://api.github.com/user', {
        headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github.v3+json' }
      }).then(function(res) {
        if (res.ok) {
          setToken(token);
          overlay.classList.add('hidden');
          toast('登录成功！', 'ok');
        } else {
          toast('Token 无效，请检查', 'err');
        }
      }).catch(function() {
        toast('网络错误', 'err');
      }).finally(function() {
        statusEl.textContent = '进入编辑器';
        statusEl.disabled = false;
      });
    });

    document.getElementById('btn-logout').addEventListener('click', function() {
      localStorage.removeItem('gh_token');
      overlay.classList.remove('hidden');
    });

    // ===== Init =====
    document.getElementById('date').value = new Date().toISOString().split('T')[0];

    // Auto slug
    var titleEl = document.getElementById('title');
    var slugEl = document.getElementById('slug');
    var manualSlug = false;
    slugEl.addEventListener('input', function() { manualSlug = true; });
    titleEl.addEventListener('input', function() {
      if (!manualSlug) {
        slugEl.value = titleEl.value.toLowerCase()
          .replace(/[^\w\u4e00-\u9fff\s-]/g, '')
          .replace(/\s+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
      }
    });

    // ===== Toolbar =====
    var editor = document.getElementById('editor');

    function insertText(action) {
      var start = editor.selectionStart, end = editor.selectionEnd;
      var sel = editor.value.substring(start, end);
      var before = editor.value.substring(0, start);
      var after = editor.value.substring(end);
      var insert = '', cursor = 0;
      switch (action) {
        case 'h2': insert = '## ' + (sel || '标题'); cursor = sel ? 0 : -2; break;
        case 'h3': insert = '### ' + (sel || '标题'); cursor = sel ? 0 : -2; break;
        case 'bold': insert = '**' + (sel || '加粗') + '**'; cursor = sel ? 0 : -2; break;
        case 'italic': insert = '*' + (sel || '斜体') + '*'; cursor = sel ? 0 : -1; break;
        case 'strike': insert = '~~' + (sel || '删除线') + '~~'; cursor = sel ? 0 : -2; break;
        case 'code': insert = '`' + (sel || 'code') + '`'; cursor = sel ? 0 : -1; break;
        case 'link': insert = '[' + (sel || '链接') + '](url)'; cursor = sel ? -1 : -5; break;
        case 'image': insert = '![' + (sel || 'alt') + '](url)'; cursor = sel ? -1 : -5; break;
        case 'ul': insert = '- ' + (sel || '列表项'); break;
        case 'ol': insert = '1. ' + (sel || '列表项'); break;
        case 'quote': insert = '> ' + (sel || '引用'); break;
        case 'codeblock': insert = '```\n' + (sel || '代码') + '\n```'; cursor = sel ? 0 : -4; break;
        case 'hr': insert = '\n---\n'; break;
        case 'table': insert = '| 列1 | 列2 | 列3 |\n| --- | --- | --- |\n|  |  |  |'; break;
        default: return;
      }
      editor.value = before + insert + after;
      editor.selectionStart = editor.selectionEnd = start + insert.length + cursor;
      editor.focus();
      updatePreview();
    }

    document.querySelectorAll('.toolbar-btn').forEach(function(b) {
      b.addEventListener('click', function() { insertText(b.dataset.action); });
    });

    editor.addEventListener('keydown', function(e) {
      if (e.key === 'Tab') {
        e.preventDefault();
        var s = editor.selectionStart;
        editor.value = editor.value.substring(0, s) + '  ' + editor.value.substring(editor.selectionEnd);
        editor.selectionStart = editor.selectionEnd = s + 2;
      }
      if (e.ctrlKey || e.metaKey) {
        if (e.key === 'b') { e.preventDefault(); insertText('bold'); }
        if (e.key === 'i') { e.preventDefault(); insertText('italic'); }
        if (e.key === 'k') { e.preventDefault(); insertText('link'); }
        if (e.key === 's') { e.preventDefault(); publish(); }
      }
    });

    editor.addEventListener('input', updatePreview);

    // ===== Tabs =====
    var editorWrap = document.getElementById('editor-wrap');
    var previewEl = document.getElementById('preview');
    var editorContainer = document.getElementById('editor-container');

    document.querySelectorAll('.tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
        tab.classList.add('active');
        var m = tab.dataset.mode;
        if (m === 'edit') { editorWrap.style.display = ''; previewEl.style.display = 'none'; editorContainer.style.gridTemplateColumns = '1fr'; }
        else if (m === 'preview') { editorWrap.style.display = 'none'; previewEl.style.display = ''; editorContainer.style.gridTemplateColumns = '1fr'; updatePreview(); }
        else { editorWrap.style.display = ''; previewEl.style.display = ''; editorContainer.style.gridTemplateColumns = '1fr 1fr'; updatePreview(); }
      });
    });

    // ===== Preview =====
    function md2html(text) {
      text = text.replace(/```(\w*)\n([\s\S]*?)```/g, function(_, l, c) { return '<pre><code>' + esc(c.trim()) + '</code></pre>'; });
      return text
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/~~(.+?)~~/g, '<del>$1</del>')
        .replace(/`(.+?)`/g, '<code>$1</code>')
        .replace(/!\[(.+?)\]\((.+?)\)/g, '<img src="$2" alt="$1"/>')
        .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2">$1</a>')
        .replace(/^> (.+)$/gm, '<blockquote><p>$1</p></blockquote>')
        .replace(/^---$/gm, '<hr/>')
        .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/^(?!<)(.+)$/gm, '<p>$1</p>');
    }
    function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function updatePreview() { previewEl.innerHTML = md2html(editor.value || '*开始写作...*'); }

    // ===== Build frontmatter =====
    function buildMd() {
      var title = document.getElementById('title').value.trim();
      var desc = document.getElementById('description').value.trim();
      var tags = document.getElementById('tags').value.split(',').map(function(t) { return t.trim(); }).filter(Boolean);
      var date = document.getElementById('date').value;
      var isDraft = document.getElementById('draft').checked;
      var body = editor.value.trim();

      var fm = '---\ntitle: "' + title + '"\ndate: ' + date + '\ndescription: "' + desc + '"';
      if (tags.length) fm += '\ntags: [' + tags.map(function(t) { return '"' + t + '"'; }).join(', ') + ']';
      if (isDraft) fm += '\ndraft: true';
      fm += '\n---\n\n' + body + '\n';
      return fm;
    }

    // ===== UTF-8 safe base64 encode =====
    function utf8ToBase64(str) {
      var bytes = new TextEncoder().encode(str);
      var binary = '';
      for (var i = 0; i < bytes.length; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      return btoa(binary);
    }

    // ===== Publish via GitHub API =====
    function publish() {
      var title = document.getElementById('title').value.trim();
      var slug = document.getElementById('slug').value.trim();
      if (!title) { toast('请填写标题', 'err'); return; }
      if (!slug) { toast('请填写文件名', 'err'); return; }
      if (!getToken()) { overlay.classList.remove('hidden'); return; }

      var statusEl = document.getElementById('status');
      var btn = document.getElementById('btn-publish');
      statusEl.textContent = '发布中...';
      btn.disabled = true;

      var content = buildMd();
      var encoded = utf8ToBase64(content);
      var filePath = PATH + '/' + slug + '.md';

      // Check if file exists (for update)
      fetch('https://api.github.com/repos/' + REPO + '/contents/' + filePath + '?ref=main', {
        headers: { 'Authorization': 'Bearer ' + getToken(), 'Accept': 'application/vnd.github.v3+json' }
      }).then(function(res) {
        return res.ok ? res.json() : null;
      }).then(function(existing) {
        var body = {
          message: existing ? 'update: ' + slug : 'create: ' + slug,
          content: encoded,
          branch: 'main'
        };
        if (existing) body.sha = existing.sha;

        return fetch('https://api.github.com/repos/' + REPO + '/contents/' + filePath, {
          method: 'PUT',
          headers: {
            'Authorization': 'Bearer ' + getToken(),
            'Accept': 'application/vnd.github.v3+json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(body)
        });
      }).then(function(res) {
        if (res.ok) {
          statusEl.textContent = '发布成功！';
          statusEl.style.color = '#22c55e';
          toast('文章已发布！网站将在 1-2 分钟内更新', 'ok');
        } else {
          return res.json().then(function(d) { throw new Error(d.message || '发布失败'); });
        }
      }).catch(function(err) {
        statusEl.textContent = err.message;
        statusEl.style.color = '#ef4444';
        toast(err.message, 'err');
      }).finally(function() {
        btn.disabled = false;
        setTimeout(function() {
          statusEl.textContent = '';
          statusEl.style.color = '';
        }, 5000);
      });
    }

    document.getElementById('btn-publish').addEventListener('click', publish);

    // ===== Clear =====
    document.getElementById('btn-clear').addEventListener('click', function() {
      if (!confirm('确定清空？')) return;
      document.getElementById('title').value = '';
      document.getElementById('description').value = '';
      document.getElementById('tags').value = '';
      document.getElementById('slug').value = '';
      document.getElementById('draft').checked = false;
      document.getElementById('date').value = new Date().toISOString().split('T')[0];
      editor.value = '';
      manualSlug = false;
      updatePreview();
    });

    // ===== Toast =====
    function toast(msg, type) {
      var el = document.createElement('div');
      el.className = 'toast toast-' + (type || 'ok');
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(function() { el.remove(); }, 3000);
    }
  </script>
</body>
</html>
