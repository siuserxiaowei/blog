<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>公众号 → X Articles 转换器 - siuser小伟</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    :root {
      --accent: #c9a96e;
      --accent-hover: #d4b87a;
      --bg: #0a0a0b;
      --surface: #141416;
      --surface-2: #1a1a1e;
      --border: #252529;
      --text: #f5f5f4;
      --text-sec: #a8a29e;
      --font-heading: "Playfair Display", "Noto Serif SC", Georgia, serif;
      --font-body: "Inter", "Noto Sans SC", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", "Fira Code", monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; }
    ::selection { background: var(--accent); color: var(--bg); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      height: 56px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; background: rgba(10,10,11,0.9); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .container { max-width: 960px; margin: 72px auto 40px; padding: 0 20px; }

    h1.page-title {
      font-family: var(--font-heading); font-size: 28px; font-weight: 700;
      margin-bottom: 6px;
    }
    .page-desc { font-size: 13px; color: var(--text-sec); margin-bottom: 28px; }

    /* Input section */
    .input-section {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 24px; margin-bottom: 24px;
    }
    .input-section h2 {
      font-family: var(--font-heading); font-size: 16px; margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .step-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 24px; height: 24px; border-radius: 50%; font-size: 12px; font-weight: 600;
      background: var(--accent); color: var(--bg); font-family: var(--font-mono);
    }

    .input-tabs { display: flex; gap: 4px; margin-bottom: 14px; }
    .input-tab {
      padding: 6px 16px; border-radius: 6px; font-size: 12px;
      cursor: pointer; background: transparent; border: 1px solid var(--border);
      color: var(--text-sec); transition: all 0.15s;
    }
    .input-tab.active { background: var(--surface-2); color: var(--accent); border-color: var(--accent); }

    .input-field {
      width: 100%; padding: 12px 14px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--surface-2);
      color: var(--text); font-size: 14px; outline: none;
      transition: border-color 0.2s; font-family: var(--font-body);
    }
    .input-field:focus { border-color: var(--accent); }
    .input-field::placeholder { color: var(--text-sec); opacity: 0.6; }
    textarea.input-field { min-height: 180px; resize: vertical; font-family: var(--font-mono); font-size: 13px; line-height: 1.6; }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 20px; border-radius: 8px; font-size: 13px;
      font-weight: 500; cursor: pointer; border: none; transition: all 0.2s;
    }
    .btn-primary { background: var(--accent); color: var(--bg); }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(201,169,110,0.3); }
    .btn-outline { background: transparent; color: var(--text-sec); border: 1px solid var(--border); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
    .btn-row { display: flex; gap: 10px; margin-top: 14px; }

    /* Result section */
    .result-section { display: none; }
    .result-section.visible { display: block; }

    .result-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 24px; margin-bottom: 24px;
    }
    .result-card h2 {
      font-family: var(--font-heading); font-size: 16px; margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }

    /* Article preview */
    .article-preview {
      background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px;
      padding: 20px; max-height: 500px; overflow-y: auto; line-height: 1.8;
    }
    .article-preview h1, .article-preview h2, .article-preview h3 {
      color: var(--text); font-family: var(--font-heading); margin: 1em 0 0.4em;
    }
    .article-preview h1 { font-size: 1.5em; }
    .article-preview h2 { font-size: 1.25em; }
    .article-preview h3 { font-size: 1.1em; }
    .article-preview p { margin-bottom: 0.8em; color: var(--text-sec); }
    .article-preview strong, .article-preview b { color: var(--text); }
    .article-preview blockquote {
      border-left: 3px solid var(--accent); padding-left: 14px;
      margin: 1em 0; font-style: italic; color: var(--text-sec);
    }
    .article-preview ul, .article-preview ol { padding-left: 1.5em; margin-bottom: 0.8em; color: var(--text-sec); }
    .article-preview li { margin-bottom: 0.3em; }
    .article-preview img { max-width: 100%; border-radius: 6px; margin: 0.8em 0; }
    .article-preview a { color: var(--accent); }
    .article-preview .img-placeholder {
      display: flex; align-items: center; gap: 8px; padding: 12px 16px;
      background: var(--surface); border: 1px dashed var(--border); border-radius: 8px;
      margin: 0.8em 0; font-size: 12px; color: var(--text-sec); font-family: var(--font-mono);
    }

    /* Images grid */
    .images-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px; margin-top: 12px;
    }
    .img-card {
      position: relative; border-radius: 8px; overflow: hidden;
      border: 1px solid var(--border); background: var(--surface-2);
      aspect-ratio: 1; cursor: pointer; transition: border-color 0.2s;
    }
    .img-card:hover { border-color: var(--accent); }
    .img-card img { width: 100%; height: 100%; object-fit: cover; }
    .img-card .img-index {
      position: absolute; top: 6px; left: 6px; padding: 2px 8px;
      background: rgba(10,10,11,0.8); border-radius: 4px;
      font-size: 11px; font-family: var(--font-mono); color: var(--accent);
    }
    .img-card .img-size {
      position: absolute; bottom: 6px; right: 6px; padding: 2px 8px;
      background: rgba(10,10,11,0.8); border-radius: 4px;
      font-size: 10px; font-family: var(--font-mono); color: var(--text-sec);
    }

    .no-images { text-align: center; padding: 24px; color: var(--text-sec); font-size: 13px; }

    /* Stats bar */
    .stats-bar {
      display: flex; gap: 20px; padding: 12px 0; margin-bottom: 16px;
      border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text-sec);
      font-family: var(--font-mono);
    }
    .stats-bar span strong { color: var(--accent); }

    /* Toast */
    .toast {
      position: fixed; top: 72px; right: 24px; padding: 12px 20px;
      border-radius: 8px; font-size: 13px; z-index: 100; animation: slideIn 0.3s ease;
    }
    .toast-ok { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
    .toast-err { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
    @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } }

    /* Loading */
    .loading { display: none; align-items: center; gap: 8px; font-size: 13px; color: var(--text-sec); margin-top: 14px; }
    .loading.visible { display: flex; }
    .spinner {
      width: 16px; height: 16px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Copy format toggle */
    .format-toggle { display: flex; gap: 4px; }
    .format-btn {
      padding: 4px 12px; border-radius: 5px; font-size: 11px;
      cursor: pointer; background: transparent; border: 1px solid var(--border);
      color: var(--text-sec); transition: all 0.15s;
    }
    .format-btn.active { background: var(--surface-2); color: var(--accent); border-color: var(--accent); }

    .copy-hint {
      font-size: 11px; color: var(--text-sec); margin-top: 10px; line-height: 1.6;
      padding: 10px 14px; background: var(--surface-2); border-radius: 6px;
    }
    .copy-hint strong { color: var(--accent); }

    @media (max-width: 640px) {
      .container { padding: 0 12px; }
      .images-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
      h1.page-title { font-size: 22px; }
    }
  </style>
</head>
<body>

  <!-- Topbar -->
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px;">
      <a href="/" style="color:var(--accent);text-decoration:none;font-family:var(--font-heading);font-size:15px;font-weight:600;">siuser小伟</a>
      <span style="font-size:11px;padding:2px 8px;border-radius:4px;background:var(--surface-2);color:var(--text-sec);">工具箱</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <a href="/blog" style="font-size:12px;color:var(--text-sec);text-decoration:none;">博客</a>
      <a href="/" style="font-size:12px;color:var(--text-sec);text-decoration:none;">首页</a>
    </div>
  </div>

  <div class="container">
    <h1 class="page-title">公众号 → X Articles</h1>
    <p class="page-desc">把微信公众号文章转换成 X (Twitter) Articles 兼容格式，一键复制粘贴，图片打包下载</p>

    <!-- Step 1: Input -->
    <div class="input-section">
      <h2><span class="step-badge">1</span> 输入文章</h2>
      <div class="input-tabs">
        <button class="input-tab active" data-input="url">粘贴链接</button>
        <button class="input-tab" data-input="html">粘贴 HTML</button>
      </div>
      <div id="input-url">
        <input type="text" class="input-field" id="url-input" placeholder="https://mp.weixin.qq.com/s/xxxxxxx" />
      </div>
      <div id="input-html" style="display:none;">
        <textarea class="input-field" id="html-input" placeholder="在公众号文章页面右键 → 查看网页源代码 → 全选复制粘贴到这里"></textarea>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-parse">
          <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
          开始解析
        </button>
        <button class="btn btn-outline" id="btn-clear">清空</button>
      </div>
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <span id="loading-text">正在获取文章...</span>
      </div>
    </div>

    <!-- Step 2: Result -->
    <div class="result-section" id="result-section">
      <!-- Stats -->
      <div class="stats-bar" id="stats-bar"></div>

      <!-- Converted content -->
      <div class="result-card">
        <h2>
          <span class="step-badge">2</span> 转换结果
          <span style="flex:1;"></span>
          <div class="format-toggle">
            <button class="format-btn active" data-format="rich">富文本复制</button>
            <button class="format-btn" data-format="plain">纯文本复制</button>
          </div>
        </h2>
        <div class="article-preview" id="article-preview"></div>
        <div class="copy-hint">
          <strong>富文本复制</strong>：直接粘贴到 X Articles 编辑器，保留标题、加粗、列表、引用等格式<br/>
          <strong>纯文本复制</strong>：去除所有格式，适合粘贴到任何地方<br/>
          <strong>图片</strong>：需要在 X 编辑器中手动上传（在下方打包下载）
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" id="btn-copy">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
            复制到剪贴板
          </button>
        </div>
      </div>

      <!-- Images -->
      <div class="result-card">
        <h2>
          <span class="step-badge">3</span> 文章图片
          <span style="flex:1;"></span>
          <span id="img-count" style="font-size:12px;color:var(--text-sec);font-family:var(--font-mono);"></span>
        </h2>
        <div id="images-container"></div>
        <div class="btn-row" id="img-actions" style="display:none;">
          <button class="btn btn-primary" id="btn-download-zip">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
            打包下载全部图片 (ZIP)
          </button>
          <button class="btn btn-outline" id="btn-copy-urls">复制图片链接列表</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ===== CORS Proxy =====
    // WeChat blocks direct fetch; use public proxy
    var PROXY_LIST = [
      function(u) { return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u); },
      function(u) { return 'https://corsproxy.io/?' + encodeURIComponent(u); }
    ];
    var IMG_PROXY = function(u) { return 'https://images.weserv.nl/?url=' + encodeURIComponent(u); };

    // ===== State =====
    var parsedData = { title: '', html: '', text: '', images: [], richHtml: '' };
    var copyFormat = 'rich';

    // ===== Input tabs =====
    document.querySelectorAll('.input-tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.input-tab').forEach(function(t) { t.classList.remove('active'); });
        tab.classList.add('active');
        var mode = tab.dataset.input;
        document.getElementById('input-url').style.display = mode === 'url' ? '' : 'none';
        document.getElementById('input-html').style.display = mode === 'html' ? '' : 'none';
      });
    });

    // ===== Format toggle =====
    document.querySelectorAll('.format-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.format-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        copyFormat = btn.dataset.format;
      });
    });

    // ===== Parse button =====
    document.getElementById('btn-parse').addEventListener('click', function() {
      var activeTab = document.querySelector('.input-tab.active').dataset.input;
      if (activeTab === 'url') {
        var url = document.getElementById('url-input').value.trim();
        if (!url) { toast('请输入公众号文章链接', 'err'); return; }
        fetchAndParse(url);
      } else {
        var html = document.getElementById('html-input').value.trim();
        if (!html) { toast('请粘贴文章 HTML', 'err'); return; }
        parseHTML(html);
      }
    });

    // ===== Fetch article via CORS proxy =====
    function fetchAndParse(url) {
      showLoading('正在获取文章...');
      tryFetch(url, 0);
    }

    function tryFetch(url, proxyIdx) {
      if (proxyIdx >= PROXY_LIST.length) {
        hideLoading();
        toast('所有代理均失败，请尝试粘贴 HTML 方式', 'err');
        return;
      }
      var proxyUrl = PROXY_LIST[proxyIdx](url);
      fetch(proxyUrl)
        .then(function(res) {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.text();
        })
        .then(function(html) {
          hideLoading();
          parseHTML(html);
        })
        .catch(function() {
          tryFetch(url, proxyIdx + 1);
        });
    }

    // ===== Parse HTML =====
    function parseHTML(html) {
      showLoading('正在解析文章...');

      try {
        var doc = new DOMParser().parseFromString(html, 'text/html');

        // Extract title
        var titleEl = doc.querySelector('#activity-name') || doc.querySelector('.rich_media_title') || doc.querySelector('h1');
        var title = titleEl ? titleEl.textContent.trim() : '未知标题';

        // Extract main content
        var contentEl = doc.querySelector('#js_content') || doc.querySelector('.rich_media_content');
        if (!contentEl) {
          hideLoading();
          toast('未找到文章正文，请确认是公众号文章页面', 'err');
          return;
        }

        // Extract images
        var images = [];
        var imgEls = contentEl.querySelectorAll('img');
        imgEls.forEach(function(img, i) {
          var src = img.getAttribute('data-src') || img.getAttribute('src') || '';
          if (src && !src.startsWith('data:') && src.indexOf('res.wx.qq.com') === -1) {
            images.push({
              src: src,
              proxySrc: IMG_PROXY(src),
              alt: img.getAttribute('alt') || '',
              index: images.length + 1
            });
          }
        });

        // Convert to X-compatible HTML
        var richHtml = convertToXFormat(contentEl, title, images);
        var plainText = convertToPlainText(contentEl, title);

        parsedData = {
          title: title,
          html: contentEl.innerHTML,
          text: plainText,
          images: images,
          richHtml: richHtml
        };

        hideLoading();
        renderResult();
        toast('解析成功！共 ' + images.length + ' 张图片', 'ok');

      } catch (e) {
        hideLoading();
        toast('解析失败：' + e.message, 'err');
      }
    }

    // ===== Convert to X Articles compatible format =====
    function convertToXFormat(contentEl, title, images) {
      // Clone to manipulate
      var clone = contentEl.cloneNode(true);

      // Remove scripts, styles, hidden elements
      clone.querySelectorAll('script, style, .qr_code_pc, .reward_area, [style*="display:none"], [style*="display: none"]').forEach(function(el) { el.remove(); });

      // Track image index
      var imgIdx = 0;

      // Process the DOM tree into clean HTML
      var html = '<h1>' + escHtml(title) + '</h1>\n';
      html += processNode(clone, images, { imgIdx: 0 });

      return html;
    }

    function processNode(node, images, state) {
      var html = '';

      for (var i = 0; i < node.childNodes.length; i++) {
        var child = node.childNodes[i];

        if (child.nodeType === 3) {
          // Text node
          var text = child.textContent;
          if (text.trim()) html += escHtml(text);
          continue;
        }

        if (child.nodeType !== 1) continue;

        var tag = child.tagName.toLowerCase();
        var style = child.getAttribute('style') || '';

        // Skip hidden
        if (style.indexOf('display:none') !== -1 || style.indexOf('display: none') !== -1) continue;

        // Images → placeholder
        if (tag === 'img') {
          var src = child.getAttribute('data-src') || child.getAttribute('src') || '';
          if (src && !src.startsWith('data:') && src.indexOf('res.wx.qq.com') === -1) {
            state.imgIdx++;
            html += '<p class="img-placeholder">[图片 ' + state.imgIdx + ' — 需在 X 编辑器手动上传]</p>\n';
          }
          continue;
        }

        // Headings
        if (/^h[1-6]$/.test(tag)) {
          var level = Math.min(parseInt(tag[1]), 3); // X only supports h1-h3 well
          html += '<h' + level + '>' + getCleanText(child) + '</h' + level + '>\n';
          continue;
        }

        // Strong / bold
        if (tag === 'strong' || tag === 'b') {
          html += '<strong>' + processNode(child, images, state) + '</strong>';
          continue;
        }

        // Emphasis
        if (tag === 'em' || tag === 'i') {
          html += '<em>' + processNode(child, images, state) + '</em>';
          continue;
        }

        // Links
        if (tag === 'a') {
          var href = child.getAttribute('href') || '';
          var text = getCleanText(child);
          if (href && text) {
            html += '<a href="' + escAttr(href) + '">' + escHtml(text) + '</a>';
          } else if (text) {
            html += escHtml(text);
          }
          continue;
        }

        // Lists
        if (tag === 'ul' || tag === 'ol') {
          html += '<' + tag + '>';
          child.querySelectorAll(':scope > li').forEach(function(li) {
            html += '<li>' + getCleanText(li) + '</li>';
          });
          html += '</' + tag + '>\n';
          continue;
        }

        // Blockquote
        if (tag === 'blockquote') {
          html += '<blockquote>' + processNode(child, images, state) + '</blockquote>\n';
          continue;
        }

        // Paragraph-level: section, p, div
        if (tag === 'p' || tag === 'section' || tag === 'div') {
          var inner = processNode(child, images, state);
          if (inner.trim()) {
            // Check if inner already contains block elements
            if (inner.indexOf('<h') !== -1 || inner.indexOf('<p ') !== -1 || inner.indexOf('<ul') !== -1 ||
                inner.indexOf('<ol') !== -1 || inner.indexOf('<blockquote') !== -1 ||
                inner.indexOf('<p>') !== -1) {
              html += inner;
            } else {
              // Detect if this looks like a heading (short text, bold style)
              var isBoldSection = style.indexOf('font-weight') !== -1 && style.indexOf('bold') !== -1;
              var isLargeText = style.indexOf('font-size') !== -1 && (style.indexOf('2') !== -1 || style.indexOf('1.') !== -1);
              var innerText = inner.replace(/<[^>]+>/g, '').trim();

              if ((isBoldSection || child.querySelector('strong, b')) && innerText.length < 50 && innerText.length > 0) {
                html += '<h2>' + innerText + '</h2>\n';
              } else {
                html += '<p>' + inner + '</p>\n';
              }
            }
          }
          continue;
        }

        // Spans and other inline elements — recurse
        if (tag === 'span' || tag === 'label') {
          var spanInner = processNode(child, images, state);
          // Check for bold styling
          if (style.indexOf('font-weight') !== -1 && (style.indexOf('bold') !== -1 || style.indexOf('700') !== -1 || style.indexOf('600') !== -1)) {
            html += '<strong>' + spanInner + '</strong>';
          } else {
            html += spanInner;
          }
          continue;
        }

        // Line break
        if (tag === 'br') {
          html += '<br/>';
          continue;
        }

        // Horizontal rule
        if (tag === 'hr') {
          html += '<hr/>\n';
          continue;
        }

        // Default: recurse
        html += processNode(child, images, state);
      }

      return html;
    }

    function getCleanText(el) {
      return el.textContent.trim();
    }

    // ===== Convert to plain text =====
    function convertToPlainText(contentEl, title) {
      var clone = contentEl.cloneNode(true);
      clone.querySelectorAll('script, style, .qr_code_pc, .reward_area').forEach(function(el) { el.remove(); });

      var text = title + '\n\n';
      var imgIdx = 0;

      function walk(node) {
        for (var i = 0; i < node.childNodes.length; i++) {
          var child = node.childNodes[i];
          if (child.nodeType === 3) {
            var t = child.textContent;
            if (t.trim()) text += t;
            continue;
          }
          if (child.nodeType !== 1) continue;

          var tag = child.tagName.toLowerCase();
          if (tag === 'img') {
            var src = child.getAttribute('data-src') || child.getAttribute('src') || '';
            if (src && !src.startsWith('data:') && src.indexOf('res.wx.qq.com') === -1) {
              imgIdx++;
              text += '\n[图片 ' + imgIdx + ']\n';
            }
            continue;
          }
          if (/^h[1-6]$/.test(tag)) { text += '\n\n' + child.textContent.trim() + '\n\n'; continue; }
          if (tag === 'p' || tag === 'div' || tag === 'section') {
            walk(child);
            text += '\n\n';
            continue;
          }
          if (tag === 'br') { text += '\n'; continue; }
          if (tag === 'li') { text += '  - ' + child.textContent.trim() + '\n'; continue; }
          if (tag === 'blockquote') { text += '\n> ' + child.textContent.trim() + '\n'; continue; }
          walk(child);
        }
      }

      walk(clone);

      // Clean up excessive newlines
      return text.replace(/\n{3,}/g, '\n\n').trim();
    }

    // ===== Render result =====
    function renderResult() {
      document.getElementById('result-section').classList.add('visible');

      // Stats
      var wordCount = parsedData.text.replace(/\s/g, '').length;
      document.getElementById('stats-bar').innerHTML =
        '<span>标题: <strong>' + escHtml(parsedData.title) + '</strong></span>' +
        '<span>字数: <strong>' + wordCount + '</strong></span>' +
        '<span>图片: <strong>' + parsedData.images.length + '</strong></span>';

      // Preview
      document.getElementById('article-preview').innerHTML = parsedData.richHtml;

      // Images
      var imgContainer = document.getElementById('images-container');
      var imgCount = document.getElementById('img-count');
      var imgActions = document.getElementById('img-actions');

      if (parsedData.images.length === 0) {
        imgContainer.innerHTML = '<div class="no-images">这篇文章没有图片</div>';
        imgActions.style.display = 'none';
        imgCount.textContent = '';
      } else {
        imgCount.textContent = parsedData.images.length + ' 张';
        imgActions.style.display = '';
        var grid = '<div class="images-grid">';
        parsedData.images.forEach(function(img) {
          grid += '<div class="img-card" title="点击在新标签页打开" onclick="window.open(\'' + img.proxySrc + '\',\'_blank\')">';
          grid += '<img src="' + img.proxySrc + '" loading="lazy" alt="图片' + img.index + '" onerror="this.parentElement.innerHTML=\'<div style=padding:20px;text-align:center;font-size:11px;color:var(--text-sec)>加载失败</div>\'" />';
          grid += '<span class="img-index">#' + img.index + '</span>';
          grid += '</div>';
        });
        grid += '</div>';
        imgContainer.innerHTML = grid;
      }

      // Scroll to result
      document.getElementById('result-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ===== Copy =====
    document.getElementById('btn-copy').addEventListener('click', function() {
      if (copyFormat === 'rich') {
        // Copy as rich text (HTML) so X editor preserves formatting
        var blob = new Blob([parsedData.richHtml], { type: 'text/html' });
        var textBlob = new Blob([parsedData.text], { type: 'text/plain' });
        navigator.clipboard.write([
          new ClipboardItem({
            'text/html': blob,
            'text/plain': textBlob
          })
        ]).then(function() {
          toast('富文本已复制！直接粘贴到 X Articles 编辑器', 'ok');
        }).catch(function(e) {
          // Fallback
          fallbackCopy(parsedData.text);
        });
      } else {
        fallbackCopy(parsedData.text);
      }
    });

    function fallbackCopy(text) {
      navigator.clipboard.writeText(text).then(function() {
        toast('纯文本已复制！', 'ok');
      }).catch(function() {
        // Last resort
        var ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
        toast('已复制！', 'ok');
      });
    }

    // ===== Copy image URLs =====
    document.getElementById('btn-copy-urls').addEventListener('click', function() {
      var urls = parsedData.images.map(function(img, i) {
        return '图片' + img.index + ': ' + img.src;
      }).join('\n');
      navigator.clipboard.writeText(urls).then(function() {
        toast('图片链接已复制', 'ok');
      });
    });

    // ===== Download images as ZIP =====
    document.getElementById('btn-download-zip').addEventListener('click', function() {
      if (!parsedData.images.length) return;
      var btn = this;
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> 正在打包...';

      var zip = new JSZip();
      var folder = zip.folder(parsedData.title.substring(0, 30) || 'wx-images');
      var done = 0;
      var total = parsedData.images.length;

      parsedData.images.forEach(function(img) {
        fetch(img.proxySrc)
          .then(function(res) { return res.blob(); })
          .then(function(blob) {
            var ext = blob.type.indexOf('png') !== -1 ? '.png' : blob.type.indexOf('gif') !== -1 ? '.gif' : '.jpg';
            folder.file('image-' + img.index + ext, blob);
          })
          .catch(function() {
            // Skip failed images
          })
          .finally(function() {
            done++;
            if (done === total) {
              zip.generateAsync({ type: 'blob' }).then(function(content) {
                var a = document.createElement('a');
                a.href = URL.createObjectURL(content);
                a.download = (parsedData.title.substring(0, 30) || 'wx-images') + '.zip';
                a.click();
                URL.revokeObjectURL(a.href);
                btn.disabled = false;
                btn.innerHTML = '<svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg> 打包下载全部图片 (ZIP)';
                toast('图片已打包下载！', 'ok');
              });
            }
          });
      });
    });

    // ===== Clear =====
    document.getElementById('btn-clear').addEventListener('click', function() {
      document.getElementById('url-input').value = '';
      document.getElementById('html-input').value = '';
      document.getElementById('result-section').classList.remove('visible');
      parsedData = { title: '', html: '', text: '', images: [], richHtml: '' };
    });

    // ===== Helpers =====
    function showLoading(text) {
      document.getElementById('loading').classList.add('visible');
      document.getElementById('loading-text').textContent = text;
      document.getElementById('btn-parse').disabled = true;
    }
    function hideLoading() {
      document.getElementById('loading').classList.remove('visible');
      document.getElementById('btn-parse').disabled = false;
    }
    function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function escAttr(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function toast(msg, type) {
      var el = document.createElement('div');
      el.className = 'toast toast-' + (type || 'ok');
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(function() { el.remove(); }, 3500);
    }

    // ===== Enter to parse =====
    document.getElementById('url-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('btn-parse').click();
    });
  </script>
</body>
</html>
